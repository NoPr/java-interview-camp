<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Java 面试冲刺 30 天 · 交互式 Dashboard</title>
<style>
:root {
  --bg: #ffffff;
  --bg-secondary: #f7f7f5;
  --bg-tertiary: #efefed;
  --border: #e3e3e0;
  --text: #1a1a1a;
  --text-secondary: #6b6b6b;
  --text-tertiary: #9b9b9b;
  --accent: #2563eb;
  --accent-light: #dbeafe;
  --accent-bg: #eff6ff;
  --green: #16a34a;
  --green-light: #dcfce7;
  --orange: #ea580c;
  --orange-light: #fed7aa;
  --red: #dc2626;
  --red-light: #fee2e2;
  --purple: #7c3aed;
  --purple-light: #ede9fe;
  --radius: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg-secondary);
  color: var(--text);
  line-height: 1.6;
  font-size: 15px;
}

/* === HEADER === */
.header {
  position: sticky; top: 0; z-index: 100;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 12px 24px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 16px;
}
.header-left { display: flex; align-items: center; gap: 12px; }
.header h1 { font-size: 18px; font-weight: 700; white-space: nowrap; }
.header-right { display: flex; align-items: center; gap: 16px; }

/* Tier Switcher */
.tier-switcher { display: flex; gap: 4px; background: var(--bg-secondary); border-radius: 8px; padding: 3px; }
.tier-btn {
  border: none; background: transparent; padding: 6px 14px;
  border-radius: 6px; font-size: 13px; cursor: pointer;
  color: var(--text-secondary); font-weight: 500;
  transition: all 0.15s;
}
.tier-btn:hover { color: var(--text); }
.tier-btn.active { background: var(--bg); color: var(--accent); box-shadow: var(--shadow); font-weight: 600; }

/* Progress */
.progress-info { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--text-secondary); }
.progress-bar { width: 120px; height: 6px; background: var(--bg-tertiary); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.3s; }
.progress-text { font-weight: 600; color: var(--text); font-variant-numeric: tabular-nums; }

/* === LAYOUT === */
.app { display: flex; max-width: 1400px; margin: 0 auto; min-height: calc(100vh - 57px); }

/* Sidebar */
.sidebar {
  width: 260px; flex-shrink: 0;
  background: var(--bg);
  border-right: 1px solid var(--border);
  padding: 20px 0;
  position: sticky; top: 57px;
  height: calc(100vh - 57px);
  overflow-y: auto;
}
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.nav-section { margin-bottom: 16px; }
.nav-section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-tertiary); padding: 0 20px; margin-bottom: 6px; }
.nav-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 20px; font-size: 13px; cursor: pointer;
  color: var(--text-secondary); border-left: 2px solid transparent;
  transition: all 0.15s;
}
.nav-item:hover { background: var(--bg-secondary); color: var(--text); }
.nav-item.active { color: var(--accent); border-left-color: var(--accent); background: var(--accent-bg); font-weight: 600; }
.nav-item .day-num { font-size: 11px; color: var(--text-tertiary); width: 24px; }
.nav-item.completed .day-num { color: var(--green); }
.nav-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.nav-dot.todo { background: var(--bg-tertiary); }
.nav-dot.in-progress { background: var(--orange); }
.nav-dot.done { background: var(--green); }

/* Main content */
.main { flex: 1; padding: 24px 32px; max-width: 1100px; }
.main::-webkit-scrollbar { width: 6px; }

/* === SECTIONS === */
.section { margin-bottom: 40px; }
.section-title { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
.section-desc { font-size: 14px; color: var(--text-secondary); margin-bottom: 20px; }

/* Roadmap */
.roadmap { display: flex; gap: 8px; margin-bottom: 12px; }
.roadmap-week {
  flex: 1; background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px; cursor: pointer;
  transition: all 0.15s; position: relative; overflow: hidden;
}
.roadmap-week:hover { border-color: var(--accent); box-shadow: var(--shadow-md); }
.roadmap-week.current { border-color: var(--accent); background: var(--accent-bg); }
.roadmap-week-title { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
.roadmap-week-range { font-size: 11px; color: var(--text-tertiary); margin-bottom: 8px; }
.roadmap-progress-bar { height: 4px; background: var(--bg-tertiary); border-radius: 2px; overflow: hidden; }
.roadmap-progress-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
.roadmap-pct { font-size: 11px; font-weight: 600; margin-top: 4px; }

/* Day Card */
.day-card {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius); margin-bottom: 12px;
  overflow: hidden; transition: box-shadow 0.15s;
}
.day-card:hover { box-shadow: var(--shadow-md); }
.day-card.expanded { box-shadow: var(--shadow-md); }
.day-header {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 20px; cursor: pointer; user-select: none;
}
.day-badge {
  display: inline-flex; align-items: center; justify-content: center;
  width: 40px; height: 40px; border-radius: 8px;
  font-size: 13px; font-weight: 700; flex-shrink: 0;
}
.day-badge.review { background: var(--purple-light); color: var(--purple); }
.day-badge.w1 { background: #fee2e2; color: #dc2626; }
.day-badge.w2 { background: #dbeafe; color: #2563eb; }
.day-badge.w3 { background: #dcfce7; color: #16a34a; }
.day-badge.w4 { background: #fef3c7; color: #d97706; }
.day-badge.w5 { background: #ede9fe; color: #7c3aed; }
.day-info { flex: 1; min-width: 0; }
.day-title { font-size: 15px; font-weight: 600; }
.day-topics { font-size: 12px; color: var(--text-secondary); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.day-status { display: flex; align-items: center; gap: 8px; }
.day-status-dot { width: 8px; height: 8px; border-radius: 50%; }
.day-status-dot.todo { background: var(--bg-tertiary); }
.day-status-dot.in-progress { background: var(--orange); }
.day-status-dot.done { background: var(--green); }
.day-chevron { color: var(--text-tertiary); transition: transform 0.2s; font-size: 12px; }
.day-card.expanded .day-chevron { transform: rotate(90deg); }

.day-body { display: none; padding: 0 20px 20px; border-top: 1px solid var(--border); }
.day-card.expanded .day-body { display: block; }

.day-section { margin-top: 16px; }
.day-section-label {
  font-size: 12px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.05em; color: var(--text-tertiary); margin-bottom: 8px;
  display: flex; align-items: center; gap: 6px;
}
.task-list { list-style: none; }
.task-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 6px 0; font-size: 14px; cursor: pointer;
}
.task-item:hover { color: var(--accent); }
.task-checkbox {
  width: 18px; height: 18px; border: 1.5px solid var(--border);
  border-radius: 4px; flex-shrink: 0; margin-top: 1px;
  cursor: pointer; transition: all 0.15s;
  display: flex; align-items: center; justify-content: center;
}
.task-item.done .task-checkbox { background: var(--green); border-color: var(--green); }
.task-item.done .task-checkbox::after { content: '✓'; color: white; font-size: 12px; font-weight: bold; }
.task-item.done .task-text { text-decoration: line-through; color: var(--text-tertiary); }
.task-text { flex: 1; }
.task-tag {
  display: inline-block; font-size: 10px; font-weight: 600;
  padding: 1px 6px; border-radius: 4px; margin-left: 6px;
  vertical-align: middle;
}
.task-tag.core { background: var(--red-light); color: var(--red); }
.task-tag.ext { background: var(--purple-light); color: var(--purple); }
.task-tag.plus { background: var(--green-light); color: var(--green); }

/* Mock interview */
.mock-box { background: var(--bg-secondary); border-radius: var(--radius); padding: 12px 16px; margin-top: 8px; }
.mock-title { font-size: 13px; font-weight: 600; color: var(--orange); margin-bottom: 6px; }
.mock-questions { display: flex; flex-wrap: wrap; gap: 8px; }
.mock-q {
  font-size: 12px; padding: 4px 10px; border-radius: 6px;
  background: var(--bg); border: 1px solid var(--border);
  cursor: pointer; transition: all 0.15s;
}
.mock-q:hover { border-color: var(--orange); color: var(--orange); }
.mock-q.done { background: var(--green-light); border-color: var(--green); color: var(--green); text-decoration: line-through; }

/* Tier-only content */
.tier-only { display: none; }
.tier-only.active { display: block; }

/* Warning callout */
.callout {
  background: #fffbeb; border: 1px solid #fde68a;
  border-radius: var(--radius); padding: 10px 14px;
  font-size: 13px; color: #92400e; margin-top: 8px;
  display: flex; gap: 8px; align-items: flex-start;
}
.callout-icon { flex-shrink: 0; }

/* === ALGORITHM SECTION === */
.algo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }
.algo-card {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px;
}
.algo-card-title { font-size: 13px; font-weight: 600; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.algo-card-title .week-tag { font-size: 10px; padding: 1px 6px; border-radius: 4px; background: var(--bg-tertiary); color: var(--text-secondary); }
.algo-item {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 0; font-size: 13px; cursor: pointer;
}
.algo-item:hover { color: var(--accent); }
.algo-checkbox {
  width: 16px; height: 16px; border: 1.5px solid var(--border);
  border-radius: 4px; flex-shrink: 0; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.algo-item.done .algo-checkbox { background: var(--green); border-color: var(--green); }
.algo-item.done .algo-checkbox::after { content: '✓'; color: white; font-size: 11px; font-weight: bold; }
.algo-item.done .algo-text { text-decoration: line-through; color: var(--text-tertiary); }
.algo-text { flex: 1; }
.algo-link {
  font-size: 11px; color: var(--text-tertiary); text-decoration: none;
  padding: 1px 6px; border-radius: 4px; border: 1px solid var(--border);
}
.algo-link:hover { color: var(--accent); border-color: var(--accent); }

/* === KEYWORD CARDS === */
.flashcard-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
.flashcard {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius); cursor: pointer;
  min-height: 120px; perspective: 600px;
}
.flashcard-inner {
  position: relative; width: 100%; min-height: 120px;
  transition: transform 0.4s; transform-style: preserve-3d;
}
.flashcard.flipped .flashcard-inner { transform: rotateY(180deg); }
.flashcard-front, .flashcard-back {
  position: absolute; width: 100%; min-height: 120px;
  backface-visibility: hidden; border-radius: var(--radius);
  padding: 16px; display: flex; flex-direction: column; justify-content: center;
}
.flashcard-front {
  background: var(--bg);
  border: 1px solid var(--border);
}
.flashcard-back {
  background: var(--accent-bg); border: 1px solid var(--accent-light);
  transform: rotateY(180deg);
}
.flashcard-label { font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 4px; }
.flashcard-title { font-size: 15px; font-weight: 600; }
.flashcard-content { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }
.flashcard-hint { font-size: 11px; color: var(--text-tertiary); margin-top: 8px; }

/* === ERROR LIST === */
.error-list-container { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); }
.error-list-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; border-bottom: 1px solid var(--border);
}
.error-list-title { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
.error-add-btn {
  background: var(--accent); color: white; border: none;
  padding: 5px 12px; border-radius: 6px; font-size: 12px;
  cursor: pointer; font-weight: 500; transition: background 0.15s;
}
.error-add-btn:hover { background: #1d4ed8; }
.error-list-body { max-height: 400px; overflow-y: auto; }
.error-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 16px; border-bottom: 1px solid var(--bg-secondary);
}
.error-item:last-child { border-bottom: none; }
.error-bullet { color: var(--red); font-size: 16px; flex-shrink: 0; margin-top: 1px; }
.error-text { flex: 1; font-size: 13px; }
.error-delete {
  color: var(--text-tertiary); cursor: pointer; font-size: 14px;
  opacity: 0; transition: opacity 0.15s;
}
.error-item:hover .error-delete { opacity: 1; }
.error-delete:hover { color: var(--red); }
.error-input-row {
  display: none; padding: 10px 16px; border-bottom: 1px solid var(--bg-secondary);
  gap: 8px;
}
.error-input-row.visible { display: flex; }
.error-input {
  flex: 1; border: 1px solid var(--border); border-radius: 6px;
  padding: 6px 10px; font-size: 13px; outline: none;
}
.error-input:focus { border-color: var(--accent); }
.error-confirm {
  background: var(--green); color: white; border: none;
  padding: 6px 14px; border-radius: 6px; font-size: 12px;
  cursor: pointer; font-weight: 500;
}
.error-confirm:hover { opacity: 0.9; }

/* === CUSTOM KNOWLEDGE POINTS === */
.custom-kp-list { list-style: none; margin-top: 6px; }
.custom-kp-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 5px 0; font-size: 14px;
}
.custom-kp-item .task-checkbox {
  width: 18px; height: 18px; border: 1.5px solid var(--accent);
  border-radius: 4px; flex-shrink: 0; margin-top: 1px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  background: var(--accent-light);
}
.custom-kp-item .task-checkbox::after { content: '★'; color: var(--accent); font-size: 11px; }
.custom-kp-item .kp-text { flex: 1; color: var(--text); }
.custom-kp-item .kp-delete {
  color: var(--text-tertiary); cursor: pointer; font-size: 13px;
  opacity: 0; transition: opacity 0.15s;
}
.custom-kp-item:hover .kp-delete { opacity: 1; }
.custom-kp-item .kp-delete:hover { color: var(--red); }
.custom-kp-add-row {
  display: none; gap: 8px; margin-top: 6px;
}
.custom-kp-add-row.visible { display: flex; }
.custom-kp-add-row input {
  flex: 1; border: 1px solid var(--border); border-radius: 6px;
  padding: 5px 10px; font-size: 13px; outline: none;
}
.custom-kp-add-row input:focus { border-color: var(--accent); }
.custom-kp-add-btn {
  background: var(--accent-light); color: var(--accent); border: 1px solid var(--accent-light);
  padding: 4px 12px; border-radius: 6px; font-size: 12px;
  cursor: pointer; font-weight: 500; transition: all 0.15s;
}
.custom-kp-add-btn:hover { background: var(--accent); color: white; }
.custom-kp-confirm {
  background: var(--green); color: white; border: none;
  padding: 5px 12px; border-radius: 6px; font-size: 12px;
  cursor: pointer; font-weight: 500;
}

/* === DAILY NOTES === */
.note-area {
  width: 100%; min-height: 60px; border: 1px solid var(--border);
  border-radius: 6px; padding: 8px 12px; font-size: 13px;
  font-family: inherit; resize: vertical; outline: none;
  background: var(--bg-secondary); color: var(--text);
  transition: border-color 0.15s;
}
.note-area:focus { border-color: var(--accent); background: var(--bg); }
.note-area::placeholder { color: var(--text-tertiary); }
.note-hint { font-size: 11px; color: var(--text-tertiary); margin-top: 4px; }

/* === BACKLOG === */
.backlog-container { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); }
.backlog-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; border-bottom: 1px solid var(--border);
}
.backlog-title { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
.backlog-add-btn {
  background: var(--accent); color: white; border: none;
  padding: 5px 12px; border-radius: 6px; font-size: 12px;
  cursor: pointer; font-weight: 500; transition: background 0.15s;
}
.backlog-add-btn:hover { background: #1d4ed8; }
.backlog-input-row {
  display: none; padding: 12px 16px; border-bottom: 1px solid var(--bg-secondary);
  gap: 8px; flex-wrap: wrap;
}
.backlog-input-row.visible { display: flex; }
.backlog-input-row input, .backlog-input-row select {
  border: 1px solid var(--border); border-radius: 6px;
  padding: 6px 10px; font-size: 13px; outline: none;
}
.backlog-input-row input:focus, .backlog-input-row select:focus { border-color: var(--accent); }
.backlog-input-main { flex: 1; min-width: 200px; }
.backlog-input-day { width: 90px; }
.backlog-input-cat { width: 100px; }
.backlog-confirm {
  background: var(--green); color: white; border: none;
  padding: 6px 14px; border-radius: 6px; font-size: 12px;
  cursor: pointer; font-weight: 500;
}
.backlog-body { max-height: 500px; overflow-y: auto; }
.backlog-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 16px; border-bottom: 1px solid var(--bg-secondary);
  transition: opacity 0.2s;
}
.backlog-item:last-child { border-bottom: none; }
.backlog-item.done { opacity: 0.5; }
.backlog-item.done .backlog-text { text-decoration: line-through; }
.backlog-cat {
  display: inline-block; font-size: 10px; font-weight: 600;
  padding: 2px 8px; border-radius: 4px; flex-shrink: 0;
}
.backlog-cat.red { background: var(--red-light); color: var(--red); }
.backlog-cat.yellow { background: #fef3c7; color: #d97706; }
.backlog-cat.green { background: var(--green-light); color: var(--green); }
.backlog-text { flex: 1; font-size: 13px; }
.backlog-day-tag { font-size: 11px; color: var(--text-tertiary); margin-top: 2px; }
.backlog-actions { display: flex; gap: 8px; align-items: center; }
.backlog-check, .backlog-delete {
  cursor: pointer; font-size: 14px; color: var(--text-tertiary);
  transition: color 0.15s;
}
.backlog-check:hover { color: var(--green); }
.backlog-delete:hover { color: var(--red); }
.backlog-empty { padding: 32px 16px; text-align: center; color: var(--text-tertiary); font-size: 14px; }

/* === PROJECT CASES === */
.case-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; }
.case-card {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px;
  border-left: 3px solid var(--accent);
}
.case-card-title { font-size: 14px; font-weight: 600; margin-bottom: 8px; }
.case-card-keywords {
  font-size: 13px; color: var(--text-secondary); line-height: 1.8;
}
.case-card-keywords .kw {
  display: inline-block; background: var(--bg-secondary);
  padding: 2px 8px; border-radius: 4px; margin: 2px 0;
  font-size: 12px; color: var(--text);
  border: 1px solid var(--border);
}

/* === SYSTEM DESIGN === */
.design-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.design-table th {
  text-align: left; padding: 10px 14px; background: var(--bg-secondary);
  font-weight: 600; border-bottom: 1px solid var(--border); font-size: 12px;
  text-transform: uppercase; letter-spacing: 0.03em; color: var(--text-secondary);
}
.design-table td {
  padding: 10px 14px; border-bottom: 1px solid var(--bg-secondary);
}
.design-table tr:hover td { background: var(--bg-secondary); }
.design-tag {
  display: inline-block; font-size: 11px; font-weight: 600;
  padding: 2px 8px; border-radius: 4px;
}
.design-tag.all { background: var(--accent-light); color: var(--accent); }
.design-tag.deep { background: var(--purple-light); color: var(--purple); }

/* === ELASTIC MECHANISM === */
.elastic-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.elastic-card {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px;
}
.elastic-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.elastic-icon { font-size: 18px; }
.elastic-card-title { font-size: 14px; font-weight: 600; }
.elastic-card-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }

/* === TIMELINE TABLE === */
.timeline-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.timeline-table th {
  text-align: left; padding: 8px 14px; background: var(--bg-secondary);
  font-weight: 600; border-bottom: 1px solid var(--border); font-size: 12px;
}
.timeline-table td { padding: 8px 14px; border-bottom: 1px solid var(--bg-secondary); }

function taskId(day, type, idx) {

function mockId(day, idx) {

}

function isDayDone(day) {
  const d = PLAN.days.find(x => x.day === day);
  if (!d) return false;
  const allTasks = getAllTasksForDay(d);
  if (!allTasks.length) return false;
  return allTasks.every(t => state.tasks[t.id]);
}
function isDayInProgress(day) {
  const d = PLAN.days.find(x => x.day === day);
  if (!d) return false;
  const allTasks = getAllTasksForDay(d);
  return allTasks.some(t => state.tasks[t.id]) && !allTasks.every(t => state.tasks[t.id]);
}

function getAllTasksForDay(d) {
  const tasks = [];
  const items = d.keyPoints || d.tasks || [];
  items.forEach((_, i) => {
    tasks.push({ id: taskId(d.day, 'kp', i) });
  });
  d.mustKnow?.forEach((_, i) => {
    tasks.push({ id: taskId(d.day, 'mk', i) });
  });
  d.mock?.forEach((_, i) => {
    tasks.push({ id: mockId(d.day, i) });
  });
  return tasks;
}

function calcGlobalProgress() {
  let total = 0, done = 0;
  PLAN.days.forEach(d => {
    const tasks = getAllTasksForDay(d);
    total += tasks.length;
    done += tasks.filter(t => state.tasks[t.id]).length;
  });
  // Algorithms
  Object.entries(PLAN.algorithms).forEach(([tier, weeks]) => {
    weeks.forEach(w => {
      w.items.forEach(item => {
        const id = algoId(w.week, item.title);
        total++;
        if (state.algo[id]) done++;
      });
    });
  });
  return total ? Math.round(done / total * 100) : 0;
}

function updateProgress() {
  const pct = calcGlobalProgress();
  document.getElementById("globalProgressFill").style.width = pct + "%";
  document.getElementById("globalProgressText").textContent = pct + "%";
}

function switchTab(tab) {
  currentTab = tab;
  expandedDay = null;
  renderSidebar();
  renderMain();
}

function expandDay(day) {
  expandedDay = expandedDay === day ? null : day;
  renderSidebar();
  renderMain();
}

function renderMain() {
  const main = document.getElementById("mainContent");
  if (currentTab === 'roadmap') main.innerHTML = renderRoadmap();
  else if (currentTab === 'daily') main.innerHTML = renderDaily();
  else if (currentTab === 'algo') main.innerHTML = renderAlgo();
  else if (currentTab === 'cards') main.innerHTML = renderCards();
  else if (currentTab === 'cases') main.innerHTML = renderCases();
  else if (currentTab === 'design') main.innerHTML = renderDesign();
  else if (currentTab === 'errors') main.innerHTML = renderErrors();
  else if (currentTab === 'backlog') main.innerHTML = renderBacklog();
  updateProgress();
}

function renderDayCard(d, weekColor) {
  const expanded = expandedDay === d.day;

  let html = `<div class="day-card ${expanded?'expanded':''}" id="day-${d.day}">
    <div class="day-header" onclick="expandDay(${d.day})">
      <div class="day-badge ${d.isReview?'review':weekColor}">${d.isReview?'复':'D'+d.day}</div>
      <div class="day-info">
        <div class="day-title">${d.title}</div>
        <div class="day-topics">${d.topics || ''}</div>
      </div>
      <div class="day-status">
        <div class="day-status-dot ${dotClass}"></div>
        <span class="day-chevron">▶</span>
      </div>
    </div>
    <div class="day-body">`;

  if (expanded) {
    // Key points / Tasks
    const items = d.keyPoints || d.tasks || [];
    if (items.length) {
      html += `<div class="day-section">
        <div class="day-section-label">${d.tasks ? '📋 任务清单' : '📌 重点知识'}</div>
        <ul class="task-list">`;
      items.forEach((item, i) => {
        const text = typeof item === 'string' ? item : item.text;
        const tag = typeof item === 'object' ? item.tag : null;
        const id = taskId(d.day, d.tasks ? 'task' : 'kp', i);
        const isChecked = state.tasks[id];
        const tagHtml = tag === 'core' ? '<span class="task-tag core">核心</span>' :
                        tag === 'ext' ? '<span class="task-tag ext">扩展</span>' :
                        tag === 'plus' ? '<span class="task-tag plus">加分</span>' : '';
        html += `<li class="task-item ${isChecked?'done':''}" onclick="toggleTask('${id}')">
          <div class="task-checkbox"></div>
          <span class="task-text">${text}${tagHtml}</span>
        </li>`;
      });
      html += `</ul></div>`;
    }

    // Must know questions
    if (d.mustKnow && d.mustKnow.length) {
      html += `<div class="day-section">
        <div class="day-section-label">❓ 必会题</div>
        <ul class="task-list">`;
      d.mustKnow.forEach((q, i) => {
        const id = taskId(d.day, 'mk', i);
        const isChecked = state.tasks[id];
        html += `<li class="task-item ${isChecked?'done':''}" onclick="toggleTask('${id}')">
          <div class="task-checkbox"></div>
          <span class="task-text">${q}</span>
        </li>`;
      });
      html += `</ul></div>`;

    // Behavior questions

      html += `<div class="day-section">
        <div class="day-section-label">🎯 行为面试题</div>
        <ul class="task-list">`;
      d.behaviorQuestions.forEach((q, i) => {
        const id = taskId(d.day, 'bq', i);
        const isChecked = state.tasks[id];
        html += `<li class="task-item ${isChecked?'done':''}" onclick="toggleTask('${id}')">
          <div class="task-checkbox"></div>
          <span class="task-text">${q}</span>
        </li>`;
      });
      html += `</ul></div>`;
    }

    // Mock upper
    if (d.mockUpper) {
      html += `<div class="day-section">
        <div class="day-section-label">🎤 模拟面试上半场</div>
        <ul class="task-list">`;

          <div class="task-checkbox"></div>

            </li></ul>`;
        }
        if (d.tier6.mock60) {
          html += `<div class="callout" style="background:#faf5ff;border-color:#e9d5ff;color:#6b21a8">
            <span class="callout-icon">🎬</span><span><strong>周末全真模拟（60 分钟）：</strong>${d.tier6.mock60}</span>
          </div>`;

    // Custom knowledge points
    const dayKp = state.customKp['d' + d.day] || [];
    html += `<div class="day-section">

    html += `</ul>

      const lcLink = item.lc ? `<a class="algo-link" href="https://leetcode.cn/problems/${item.lc.split('/')[0]}/" target="_blank">LC ${item.lc}</a>` : '';
      html += `<div class="algo-item ${isChecked?'done':''}" onclick="toggleAlgo('${id}')">
        <div class="algo-checkbox"></div>
        <span class="algo-text">${item.title} <span style="font-size:11px;color:var(--text-tertiary)">${item.days}</span></span>
        ${lcLink}
      </div>`;
    });
    html += `</div>`;
  });
  html += `</div>`;

  if (extraAlgos.length) {
    html += `<div class="section-title" style="font-size:16px;margin-bottom:12px">${currentTier==='5h'?'5h':'6h'} 版新增题目</div>
    <div class="algo-grid">`;
    extraAlgos.forEach(w => {
      if (!w.items.length) return;
      html += `<div class="algo-card">
        <div class="algo-card-title">第 ${w.week} 周 <span class="week-tag">新增</span></div>`;
      w.items.forEach(item => {
        const id = algoId(w.week + 100, item.title);
        const isChecked = state.algo[id];
        const lcLink = item.lc ? `<a class="algo-link" href="https://leetcode.cn/problems/${item.lc.split('/')[0]}/" target="_blank">LC ${item.lc}</a>` : '';
        html += `<div class="algo-item ${isChecked?'done':''}" onclick="toggleAlgo('${id}')">
          <div class="algo-checkbox"></div>
          <span class="algo-text">${item.title} <span style="font-size:11px;color:var(--text-tertiary)">${item.days}</span></span>
          ${lcLink}
        </div>`;
      });
      html += `</div>`;
    });
    html += `</div>`;
  }

  html += `</div>`;
  return html;
}

// --- Cases ---
function renderCases() {
  const cases = [
    { title: "线程池 OOM", keywords: "数据采集任务量大 | 无界队列堆积 | jmap + MAT 分析堆 dump | 堆内存撑爆 | 改有界队列 + CallerRunsPolicy + 分批提交 + 背压 | 压测后内存稳定" },
    { title: "慢 SQL 优化", keywords: "接口响应慢 | 慢查询日志定位 | Explain 看 type/rows/Extra | 全表扫描 + 未走索引 | 加联合索引 + 覆盖索引优化 | 查询时间显著下降" },
    { title: "Redis 缓存一致性", keywords: "高频读取商品信息 | 先更新 DB 再删缓存 | 并发场景短暂不一致 | 延迟双删 / Canal 订阅 binlog / MQ 异步同步 | 最终一致" },
    { title: "MQ 消息积压", keywords: "消费速度跟不上生产 | 消费者处理耗时 | 临时扩容消费者 + 线程池并行消费 | 修复后逐步消化积压 | 增加监控告警阈值" },
    { title: "Nacos 长轮询 + OpenFeign", keywords: "客户端长轮询请求 | 服务端 hold 29.5s | 配置变更立即返回 | 客户端拉取新配置 | OpenFeign 动态代理 → 负载均衡 → 选择实例 → HTTP 调用" }
  ];
  let html = `<div class="section">
    <div class="section-title">项目案例关键词卡片</div>

// --- Errors ---
function renderErrors() {
  let html = `<div class="section">
    <div class="section-title">易错清单</div>
    <div class="section-desc">面试前必看的高频易错点，可自定义增删</div>
    <div class="error-list-container">

      </div>
      <div class="error-input-row" id="errorInputRow">
        <input class="error-input" id="errorInput" placeholder="输入易错点..." onkeydown="if(event.key==='Enter')confirmAddError()">

// --- Backlog (待补清单) ---
function renderBacklog() {
  let html = `<div class="section">
    <div class="section-title">待补清单</div>
    <div class="section-desc">弹性机制：遇到计划外知识点时记录于此，指定类型和计划补的日期</div>
    <div class="backlog-container">
      <div class="backlog-header">
        <div class="backlog-title">📋 共 ${state.backlog.length} 条</div>
        <button class="backlog-add-btn" onclick="toggleAddBacklog()">+ 添加</button>
      </div>
      <div class="backlog-input-row" id="backlogInputRow">
        <input class="backlog-input-main" id="backlogInput" placeholder="输入知识点名称..." onkeydown="if(event.key==='Enter')confirmAddBacklog()">
        <select class="backlog-input-cat" id="backlogCat">
          <option value="red">🔴 阻塞型</option>
          <option value="yellow" selected>🟡 关联型</option>
          <option value="green">🟢 加分型</option>
        </select>
        <select class="backlog-input-day" id="backlogDay">
          <option value="">补的日子</option>`;
  for (let i = 1; i <= 30; i++) {
    html += `<option value="${i}">Day ${i}</option>`;
  }
  html += `</select>
        <button class="backlog-confirm" onclick="confirmAddBacklog()">确认</button>
      </div>
      <div class="backlog-body" id="backlogBody">`;
  
  if (state.backlog.length === 0) {
    html += `<div class="backlog-empty">暂无待补知识点<br><span style="font-size:12px">学习过程中遇到计划外的知识点，随时记录到这里</span></div>`;
  } else {
    const catLabels = { red: '🔴 阻塞型', yellow: '🟡 关联型', green: '🟢 加分型' };
    state.backlog.forEach((b, i) => {
      html += `<div class="backlog-item ${b.done?'done':''}">
        <span class="backlog-cat ${b.cat}">${catLabels[b.cat]||'🟡 关联型'}</span>
        <div style="flex:1">
          <div class="backlog-text">${b.text}</div>
          ${b.day ? `<div class="backlog-day-tag">计划补：Day ${b.day}</div>` : '<div class="backlog-day-tag">未指定</div>'}
        </div>
        <div class="backlog-actions">
          <span class="backlog-check" onclick="toggleBacklogDone(${i})" title="标记完成">${b.done?'✓':'○'}</span>
          <span class="backlog-delete" onclick="deleteBacklog(${i})" title="删除">✕</span>
        </div>
      </div>`;
    });
  }
  
  html += `</div></div></div>`;
  return html;
}

// ===================== INTERACTIONS =====================
function toggleTask(id) {
  state.tasks[id] = !state.tasks[id];
  saveState();
  renderMain();
  renderSidebar();
}
function toggleMock(id) {
  state.mock[id] = !state.mock[id];
  saveState();
  renderMain();
}
function toggleAlgo(id) {
  state.algo[id] = !state.algo[id];
  saveState();
  renderMain();
}
function switchTier(tier) {
  currentTier = tier;
  renderMain();
  renderSidebar();
}
function switchTierForAlgo(tier) {
  currentTier = tier;
  // Update header buttons
  document.querySelectorAll('.tier-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tier === tier);
  });
  renderMain();
}
function toggleAddError() {
  const row = document.getElementById("errorInputRow");
  row.classList.toggle("visible");
  if (row.classList.contains("visible")) {
    document.getElementById("errorInput").focus();
  }
}
function confirmAddError() {
  const input = document.getElementById("errorInput");
  const val = input.value.trim();
  if (val) {
    state.errors.push(val);
    saveState();
    renderMain();
  }
}
function deleteError(idx) {
  state.errors.splice(idx, 1);
  saveState();
  renderMain();
}

// --- Custom Knowledge Points ---
function toggleAddKp(day) {
  const row = document.getElementById('kpAddRow-' + day);
  row.classList.toggle('visible');
  if (row.classList.contains('visible')) {
    row.querySelector('input').focus();
  }
}
function confirmAddKp(day, input) {
  const val = input.value.trim();
  if (val) {
    const key = 'd' + day;
    if (!state.customKp[key]) state.customKp[key] = [];
    state.customKp[key].push(val);
    saveState();
    renderMain();
  }
}
function deleteCustomKp(day, idx) {
  const key = 'd' + day;
  if (state.customKp[key]) {
    state.customKp[key].splice(idx, 1);
    if (state.customKp[key].length === 0) delete state.customKp[key];
    saveState();
    renderMain();
  }
}

// --- Daily Notes ---
function saveNote(day, val) {
  const key = 'd' + day;
  if (val.trim()) {
    state.notes[key] = val;
  } else {
    delete state.notes[key];
  }
  saveState();
}

// --- Backlog (待补清单) ---
function toggleAddBacklog() {
  const row = document.getElementById("backlogInputRow");
  row.classList.toggle("visible");
  if (row.classList.contains("visible")) {
    document.getElementById("backlogInput").focus();
  }
}
function confirmAddBacklog() {
  const input = document.getElementById("backlogInput");
  const cat = document.getElementById("backlogCat").value;
  const day = document.getElementById("backlogDay").value;
  const val = input.value.trim();
  if (val) {
    state.backlog.push({ text: val, cat: cat, day: day ? parseInt(day) : null, done: false });
    saveState();
    renderMain();
  }
}
function toggleBacklogDone(idx) {
  state.backlog[idx].done = !state.backlog[idx].done;
  saveState();
  renderMain();
}
function deleteBacklog(idx) {
  state.backlog.splice(idx, 1);
  saveState();
  renderMain();
}

// Tier switcher buttons
document.querySelectorAll('.tier-btn').forEach(btn => {
  btn.addEventListener('click', () => switchTier(btn.dataset.tier));
});

// Initial render
renderSidebar();
renderMain();
</script>
</body>
</html>
