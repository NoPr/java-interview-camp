<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Java 面试冲刺 30 天</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ===== DESIGN TOKENS ===== */
:root {
  --bg: #ffffff;
  --bg-sidebar: #fafafa;
  --bg-hover: #f5f5f4;
  --bg-active: #eff6ff;
  --bg-block-blue: #eff6ff;
  --bg-block-purple: #f5f3ff;
  --bg-block-green: #f0fdf4;
  --bg-block-orange: #fff7ed;
  --bg-block-yellow: #fefce8;
  --bg-block-red: #fef2f2;
  --bg-block-amber: #fffbeb;
  --bg-block-gray: #f8f8f8;

  --text-primary: #1a1a1a;
  --text-body: #555555;
  --text-muted: #999999;
  --text-faint: #cccccc;

  --blue: #3b82f6;
  --blue-dark: #1e40af;
  --purple: #8b5cf6;
  --purple-dark: #6d28d9;
  --green: #22c55e;
  --green-dark: #15803d;
  --orange: #f97316;
  --orange-dark: #c2410c;
  --yellow: #eab308;
  --yellow-dark: #a16207;
  --red: #ef4444;
  --red-dark: #b91c1c;
  --amber: #f59e0b;
  --amber-dark: #b45309;
  --gray: #6b7280;

  --border: #e5e5e5;
  --border-light: #f0f0f0;

  --radius-sm: 4px;
  --radius-md: 6px;
  --radius-lg: 8px;
  --radius-xl: 12px;

  --transition: 150ms ease;
  --shadow-sm: 0 1px 2px 0 rgba(0,0,0,0.05);
  --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);

  --font-sans: 'Noto Sans SC', -apple-system, system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', 'Cascadia Code', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-sans);
  font-size: 14px;
  line-height: 1.6;
  color: var(--text-primary);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
}

/* ===== LAYOUT ===== */
.app {
  display: flex;
  height: 100vh;
  overflow: hidden;
}

.sidebar {
  width: 240px;
  flex-shrink: 0;
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
}

.main {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

/* ===== HEADER ===== */
.header {
  height: 56px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
}

.header-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.header-logo {
  font-size: 15px;
  font-weight: 500;
  color: var(--text-primary);
}

.header-right {
  display: flex;
  align-items: center;
  gap: 8px;
}

.streak {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 13px;
  font-weight: 500;
  color: var(--orange);
  padding: 4px 10px;
  background: #fff7ed;
  border-radius: var(--radius-md);
}

.tier-switch {
  display: flex;
  gap: 0;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  overflow: hidden;
}

.tier-btn {
  padding: 4px 12px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-muted);
  background: var(--bg);
  border: none;
  cursor: pointer;
  transition: var(--transition);
  font-family: var(--font-sans);
}

.tier-btn.active {
  background: var(--blue);
  color: #fff;
}

.tier-btn:hover:not(.active) {
  background: var(--bg-hover);
  color: var(--text-primary);
}

.btn {
  padding: 4px 12px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-body);
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: var(--transition);
  font-family: var(--font-sans);
  white-space: nowrap;
}

.btn:hover {
  background: var(--bg-hover);
  border-color: var(--text-faint);
}

/* ===== SIDEBAR ===== */
.sidebar-section {
  padding: 8px 0;
}

.sidebar-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  padding: 4px 16px;
  cursor: pointer;
  user-select: none;
  display: flex;
  align-items: center;
  gap: 4px;
}

.sidebar-label:hover {
  color: var(--text-body);
}

.week-progress {
  margin-left: auto;
  font-size: 10px;
  color: var(--text-faint);
  font-weight: 400;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 16px;
  font-size: 13px;
  color: var(--text-body);
  cursor: pointer;
  transition: var(--transition);
  border-radius: 0;
}

.nav-item:hover {
  background: var(--bg-hover);
  color: var(--text-primary);
}

.nav-item.active {
  background: var(--bg-active);
  color: var(--blue-dark);
  font-weight: 500;
}

.nav-item.active .nav-dot {
  background: var(--blue);
}

.nav-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  flex-shrink: 0;
  transition: var(--transition);
}

.nav-dot.done { background: var(--green); border-color: var(--green); }
.nav-dot.current { background: var(--blue); border-color: var(--blue); }
.nav-dot.review { background: #f5f5f4; border-color: var(--border); }
.nav-dot.blocked { background: var(--red); border-color: var(--red); }

.nav-progress {
  margin-left: auto;
  font-size: 10px;
  color: var(--text-faint);
  font-family: var(--font-mono);
}

.sidebar-divider {
  height: 1px;
  background: var(--border-light);
  margin: 4px 12px;
}

/* ===== MAIN CONTENT ===== */
.content {
  flex: 1;
  padding: 24px 32px;
  max-width: 900px;
}

.content-header {
  margin-bottom: 20px;
}

.breadcrumb {
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 4px;
}

.breadcrumb span {
  margin: 0 2px;
}

.day-title {
  font-size: 22px;
  font-weight: 500;
  color: var(--text-primary);
  letter-spacing: -0.02em;
}

/* Time schedule bar */
.schedule-bar {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 8px 12px;
  background: var(--bg-block-gray);
  border-radius: var(--radius-md);
  margin-bottom: 20px;
  font-size: 12px;
  color: var(--text-muted);
  flex-wrap: wrap;
}

.schedule-bar .seg { display: inline-flex; align-items: center; gap: 2px; }
.schedule-bar .arrow { color: var(--text-faint); margin: 0 2px; }
.schedule-bar .seg-blue { color: var(--blue); }
.schedule-bar .seg-green { color: var(--green); }
.schedule-bar .seg-orange { color: var(--orange); }
.schedule-bar .seg-yellow { color: var(--yellow-dark); }

/* Block warning */
.block-warning {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  background: var(--bg-block-red);
  border-left: 3px solid var(--red);
  border-radius: 0 var(--radius-md) var(--radius-md) 0;
  margin-bottom: 16px;
  font-size: 13px;
  color: var(--red-dark);
  font-weight: 500;
}

/* ===== DAY BLOCKS ===== */
.block {
  margin-bottom: 16px;
  border-radius: 0 var(--radius-lg) var(--radius-lg) 0;
  padding: 14px 16px;
  position: relative;
}

.block::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 3px;
  border-radius: var(--radius-lg) 0 0 var(--radius-lg);
}

.block-blue { background: var(--bg-block-blue); }
.block-blue::before { background: var(--blue); }
.block-purple { background: var(--bg-block-purple); }
.block-purple::before { background: var(--purple); }
.block-green { background: var(--bg-block-green); }
.block-green::before { background: var(--green); }
.block-orange { background: var(--bg-block-orange); }
.block-orange::before { background: var(--orange); }
.block-yellow { background: var(--bg-block-yellow); }
.block-yellow::before { background: var(--yellow); }
.block-gray { background: var(--bg-block-gray); }
.block-gray::before { background: var(--gray); }

.block-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

.block-title {
  font-size: 14px;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 6px;
}
.block-blue .block-title { color: var(--blue-dark); }
.block-purple .block-title { color: var(--purple-dark); }
.block-green .block-title { color: var(--green-dark); }
.block-orange .block-title { color: var(--orange-dark); }
.block-yellow .block-title { color: var(--yellow-dark); }
.block-gray .block-title { color: var(--gray); }

.block-progress {
  font-size: 12px;
  font-weight: 400;
}
.block-blue .block-progress { color: var(--blue); }
.block-purple .block-progress { color: var(--purple); }
.block-green .block-progress { color: var(--green); }
.block-orange .block-progress { color: var(--orange); }
.block-yellow .block-progress { color: var(--yellow); }
.block-gray .block-progress { color: var(--gray); }

/* ===== TASK ITEMS ===== */
.task-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.task-item {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 6px 10px;
  background: #fff;
  border-radius: var(--radius-md);
  transition: var(--transition);
  cursor: pointer;
}

.task-item:hover {
  background: #fafafa;
}

.checkbox {
  width: 16px;
  height: 16px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  flex-shrink: 0;
  margin-top: 1px;
  transition: var(--transition);
  position: relative;
  cursor: pointer;
}

.checkbox:hover {
  border-color: var(--blue);
}

.checkbox.checked {
  background: var(--blue);
  border-color: var(--blue);
}

.checkbox.checked::after {
  content: '';
  position: absolute;
  top: 2px;
  left: 5px;
  width: 4px;
  height: 7px;
  border: solid #fff;
  border-width: 0 1.5px 1.5px 0;
  transform: rotate(45deg);
}

.task-text {
  font-size: 13px;
  color: var(--text-body);
  line-height: 1.5;
  flex: 1;
}

.task-item.done .task-text {
  color: var(--text-faint);
  text-decoration: line-through;
}

/* Mock question */
.mock-item {
  background: #fff;
  border-radius: var(--radius-md);
  padding: 8px 10px;
  margin-bottom: 6px;
}

.mock-top {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
}

.mock-timer {
  font-size: 12px;
  font-family: var(--font-mono);
  padding: 2px 6px;
  border-radius: var(--radius-sm);
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border);
  color: var(--text-muted);
  background: var(--bg);
  transition: var(--transition);
}

.mock-timer.timing { color: var(--yellow-dark); border-color: var(--yellow); background: #fefce8; }
.mock-timer.warn { color: var(--orange-dark); border-color: var(--orange); background: #fff7ed; }
.mock-timer.danger { color: var(--red-dark); border-color: var(--red); background: #fef2f2; }
.mock-timer.done { color: var(--green-dark); border-color: var(--green); background: #f0fdf4; }

.mock-question {
  font-size: 13px;
  color: var(--text-body);
  line-height: 1.5;
}

.mock-item.done .mock-question {
  color: var(--text-faint);
  text-decoration: line-through;
}

.mock-tips {
  margin-top: 6px;
  font-size: 12px;
  color: var(--text-muted);
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 2px;
}

.mock-tips-content {
  margin-top: 6px;
  padding: 8px 10px;
  background: var(--bg-block-gray);
  border-radius: var(--radius-md);
  font-size: 12px;
  color: var(--text-body);
  line-height: 1.6;
  display: none;
}

.mock-tips-content.show { display: block; }

/* ===== KEYWORD CARD INLINE ===== */
.card-inline {
  background: #fff;
  border-radius: var(--radius-md);
  padding: 10px 12px;
  border: 1px solid var(--border-light);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  cursor: pointer;
  transition: var(--transition);
}

.card-inline:hover {
  border-color: var(--green);
}

.card-inline-title {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-primary);
}

.card-inline-hint {
  font-size: 11px;
  color: var(--text-muted);
}

.card-inline-actions {
  display: flex;
  gap: 6px;
}

.card-eval-btn {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: #fff;
  color: var(--text-muted);
  cursor: pointer;
  transition: var(--transition);
}

.card-eval-btn.pass-active { background: #f0fdf4; color: var(--green-dark); border-color: var(--green); }
.card-eval-btn.fail-active { background: #fef2f2; color: var(--red-dark); border-color: var(--red); }

/* ===== ALGO ITEM ===== */
.algo-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #fff;
  padding: 8px 10px;
  border-radius: var(--radius-md);
}

.algo-left {
  display: flex;
  align-items: center;
  gap: 8px;
}

.algo-name {
  font-size: 13px;
  color: var(--text-body);
}

.algo-tag {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--orange);
  padding: 2px 8px;
  background: #fff7ed;
  border-radius: var(--radius-sm);
  border: 1px solid #fed7aa;
  text-decoration: none;
  transition: var(--transition);
}

.algo-tag:hover {
  background: #ffedd5;
}

/* ===== CUSTOM KP ===== */
.custom-kp-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 10px;
  background: #fff;
  border-radius: var(--radius-md);
  margin-bottom: 4px;
}

.kp-badge {
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 8px;
  font-weight: 500;
  white-space: nowrap;
}

.kp-badge.red { background: #fef2f2; color: var(--red-dark); }
.kp-badge.yellow { background: #fffbeb; color: var(--amber-dark); }
.kp-badge.green { background: #f0fdf4; color: var(--green-dark); }

.kp-delete {
  margin-left: auto;
  font-size: 14px;
  color: var(--text-faint);
  cursor: pointer;
  border: none;
  background: none;
  padding: 0 4px;
  line-height: 1;
  transition: var(--transition);
}

.kp-delete:hover { color: var(--red); }

.custom-kp-add {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 6px;
  flex-wrap: wrap;
}

.kp-input {
  flex: 1;
  min-width: 120px;
  padding: 4px 10px;
  font-size: 13px;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  font-family: var(--font-sans);
  outline: none;
  transition: var(--transition);
}

.kp-input:focus { border-color: var(--blue); box-shadow: 0 0 0 2px rgba(59,130,246,0.1); }

.priority-select {
  display: flex;
  gap: 4px;
}

.priority-btn {
  font-size: 11px;
  padding: 3px 8px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: #fff;
  cursor: pointer;
  transition: var(--transition);
  font-family: var(--font-sans);
}

.priority-btn.sel-red { background: #fef2f2; border-color: var(--red); color: var(--red-dark); }
.priority-btn.sel-yellow { background: #fffbeb; border-color: var(--amber); color: var(--amber-dark); }
.priority-btn.sel-green { background: #f0fdf4; border-color: var(--green); color: var(--green-dark); }

/* ===== REVIEW DAY ===== */
.review-overview {
  background: #fff;
  border-radius: var(--radius-lg);
  border: 1px solid var(--border-light);
  padding: 16px 20px;
  margin-bottom: 16px;
}

.review-stat {
  display: flex;
  align-items: center;
  gap: 24px;
  flex-wrap: wrap;
}

.review-stat-item {
  text-align: center;
}

.review-stat-num {
  font-size: 24px;
  font-weight: 500;
  font-family: var(--font-mono);
}

.review-stat-label {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 2px;
}

.review-aggregate {
  margin-bottom: 16px;
}

.review-aggregate-title {
  font-size: 14px;
  font-weight: 500;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}

/* ===== MODAL ===== */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.3);
  z-index: 100;
  align-items: center;
  justify-content: center;
}

.modal-overlay.show { display: flex; }

.modal {
  background: #fff;
  border-radius: var(--radius-xl);
  padding: 24px 28px;
  max-width: 640px;
  width: 90%;
  max-height: 80vh;
  overflow-y: auto;
  box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
}

.modal-title {
  font-size: 18px;
  font-weight: 500;
  margin-bottom: 16px;
}

.modal-close {
  float: right;
  font-size: 18px;
  color: var(--text-muted);
  cursor: pointer;
  border: none;
  background: none;
  line-height: 1;
}

.review-section {
  margin-bottom: 16px;
}

.review-section-title {
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 6px;
  padding-bottom: 4px;
  border-bottom: 1px solid var(--border-light);
}

.review-section-item {
  font-size: 13px;
  color: var(--text-body);
  padding: 4px 0;
  display: flex;
  align-items: center;
  gap: 6px;
}

.review-section-item .source {
  font-size: 11px;
  color: var(--text-muted);
  margin-left: auto;
}

/* ===== TOOLBOX VIEWS ===== */
.toolbox-content {
  max-width: 900px;
}

.toolbox-header {
  font-size: 20px;
  font-weight: 500;
  margin-bottom: 20px;
  letter-spacing: -0.02em;
}

/* Card library */
.card-filter {
  display: flex;
  gap: 6px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}

.filter-btn {
  font-size: 12px;
  padding: 4px 12px;
  border-radius: var(--radius-md);
  border: 1px solid var(--border);
  background: #fff;
  color: var(--text-muted);
  cursor: pointer;
  transition: var(--transition);
  font-family: var(--font-sans);
}

.filter-btn.active {
  background: var(--blue);
  color: #fff;
  border-color: var(--blue);
}

.card-week-group {
  margin-bottom: 24px;
}

.card-week-title {
  font-size: 14px;
  font-weight: 500;
  color: var(--text-primary);
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border-light);
}

.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 10px;
}

.flip-card {
  perspective: 600px;
  height: 120px;
  cursor: pointer;
}

.flip-card-inner {
  position: relative;
  width: 100%;
  height: 100%;
  transition: transform 400ms;
  transform-style: preserve-3d;
}

.flip-card.flipped .flip-card-inner {
  transform: rotateY(180deg);
}

.flip-card-front, .flip-card-back {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  border-radius: var(--radius-lg);
  border: 1px solid var(--border-light);
  padding: 12px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.flip-card-front {
  background: #fff;
}

.flip-card-back {
  background: var(--bg-block-green);
  transform: rotateY(180deg);
}

.flip-card-title {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-primary);
  margin-bottom: 4px;
}

.flip-card-hint {
  font-size: 11px;
  color: var(--text-muted);
}

.flip-card-keywords {
  font-size: 12px;
  color: var(--green-dark);
  line-height: 1.5;
}

.flip-card-actions {
  margin-top: 8px;
  display: flex;
  gap: 6px;
}

let state = {

  cardEval: {},   // "card_day2_0": "pass"/"fail"

  checkins: [],   // ["2026-06-23"]
  tier: '5h',
  lastDay: 1,

  currentView: 'day', // day / overview / cards / errors / algo / cases / design
  timerInterval: null,
  timerKey: null,
  expandedWeeks: [1]
};

// Load state
function loadState() {
  try {
    const saved = localStorage.getItem('java-interview-state');
    if (saved) {
      const parsed = JSON.parse(saved);
      Object.assign(state, parsed);
    }
  } catch(e) {}
  if (!state.errors.length) state.errors = PLAN.defaultErrors.map(t => ({ text: t, done: false }));
  if (!state.currentDay) state.currentDay = 1;
}

function saveState() {
  try {
    localStorage.setItem('java-interview-state', JSON.stringify(state));
  } catch(e) {}
}

// ===================== HELPERS =====================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function todayStr() {
  return new Date().toISOString().slice(0, 10);
}

function calcStreak() {
  if (!state.checkins.length) return 0;
  const sorted = [...state.checkins].sort();
  let streak = 0;
  let tempDate = new Date();
  let weekMiss = 0;
  for (let i = 0; i < 365; i++) {
    const ds = tempDate.toISOString().slice(0, 10);
    if (sorted.includes(ds)) {
      streak++;
      weekMiss = 0;
    } else {
      weekMiss++;
      if (weekMiss > 1) break;
    }
    tempDate.setDate(tempDate.getDate() - 1);
  }
  return streak;
}

function dayTaskKey(day, idx) { return `day${day}_t${idx}`; }
function dayMockKey(day, idx) { return `day${day}_m${idx}`; }
function cardKey(day) { return `card_day${day}_0`; }

function dayProgress(day) {
  const d = PLAN.days[day];
  if (!d) return { done: 0, total: 0 };
  let done = 0, total = 0;
  if (d.knowledge) { d.knowledge.forEach((_, i) => { total++; if (state.tasks[dayTaskKey(day, i)]) done++; }); }
  if (d.mustKnow) { d.mustKnow.forEach((_, i) => { total++; if (state.tasks[dayTaskKey(day, 100 + i)]) done++; }); }
  if (d.mock) { d.mock.forEach((_, i) => { total++; if (state.mock[dayMockKey(day, i)]) done++; }); }
  if (d.algo && d.algo.lc) { total++; if (state.algo['lc' + d.algo.lc]) done++; }
  if (d.card) { total++; if (state.cardEval[cardKey(day)] === 'pass') done++; }
  // custom kps
  state.customKps.filter(k => k.day === day).forEach(k => { total++; if (k.done) done++; });
  return { done, total };
}

function weekProgress(weekIdx) {
  const w = PLAN.weeks[weekIdx];
  let done = 0, total = 0;
  w.days.forEach(d => {
    const p = dayProgress(d);
    done += p.done;
    total += p.total;
  });
  return { done, total };
}

function hasBlockedKp(day) {
  return state.customKps.some(k => k.day === day && k.priority === 'red' && !k.done);
}

// ===================== RENDER SIDEBAR =====================
function renderSidebar() {
  const el = document.getElementById('sidebar');
  let html = '<div class="sidebar-section">';

  // Week groups
  PLAN.weeks.forEach((w, idx) => {
    const wp = weekProgress(idx);
    const pct = wp.total > 0 ? Math.round(wp.done / wp.total * 100) : 0;
    const expanded = state.expandedWeeks.includes(idx + 1);
    html += `<div class="sidebar-label" onclick="toggleWeek(${idx + 1})">`;
    html += `<span>${expanded ? '▼' : '▶'}</span> ${w.name}`;
    html += `<span class="week-progress">${wp.done}/${wp.total}</span>`;
    html += `</div>`;
    if (expanded) {
      w.days.forEach(d => {
        const day = PLAN.days[d];
        if (!day) return;
        const p = dayProgress(d);
        const isActive = state.currentView === 'day' && state.currentDay === d;
        let dotClass = 'nav-dot';
        if (isActive) dotClass += ' current';
        else if (p.total > 0 && p.done === p.total) dotClass += ' done';
        else if (day.isReview) dotClass += ' review';
        else if (hasBlockedKp(d)) dotClass += ' blocked';
        const pctStr = p.total > 0 ? `${Math.round(p.done / p.total * 100)}%` : '';
        html += `<div class="nav-item ${isActive ? 'active' : ''}" onclick="goToDay(${d})">`;
        html += `<span class="${dotClass}"></span>`;
        html += `<span>D${d} ${day.title}</span>`;
        html += `<span class="nav-progress">${pctStr}</span>`;
        html += `</div>`;
      });
    }
  });

  html += '<div class="sidebar-divider"></div>';

  // Toolbox
  html += '<div class="sidebar-label"><span>▼</span> 工具箱</div>';
  const tools = [
    { key: 'overview', label: '总览' },
    { key: 'cards', label: '卡片库' },
    { key: 'errors', label: '易错清单' },
    { key: 'cases', label: '项目案例' },
    { key: 'design', label: '系统设计' }
  ];
  tools.forEach(t => {
    html += `<div class="nav-item ${state.currentView === t.key ? 'active' : ''}" onclick="goToTool('${t.key}')">`;
    html += `<span class="nav-dot"></span> ${t.label}</div>`;
  });

  html += '</div>';
  el.innerHTML = html;
}

function toggleWeek(w) {
  const i = state.expandedWeeks.indexOf(w);
  if (i >= 0) state.expandedWeeks.splice(i, 1);
  else state.expandedWeeks.push(w);
  renderSidebar();
}

// ===================== RENDER MAIN =====================
function renderMain() {
  const el = document.getElementById('content');

  // Update streak
  document.getElementById('streak').textContent = `🔥 ${calcStreak()} 天`;

  // Update tier buttons
  document.querySelectorAll('.tier-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tier === state.tier);
  });

  if (state.currentView === 'day') {
    el.innerHTML = renderDay(state.currentDay);
  } else if (state.currentView === 'overview') {
    el.innerHTML = renderOverview();
  } else if (state.currentView === 'cards') {
    el.innerHTML = renderCardLibrary();
  } else if (state.currentView === 'errors') {
    el.innerHTML = renderErrors();
  } else if (state.currentView === 'cases') {
    el.innerHTML = renderCases();
  } else if (state.currentView === 'design') {
    el.innerHTML = renderDesign();
  }
}

function renderDay(day) {
  const d = PLAN.days[day];
  if (!d) return '<div class="empty-state">未找到该天数据</div>';
  state.lastDay = day;
  saveState();

  // Check-in
  const today = todayStr();
  if (!state.checkins.includes(today)) {
    const p = dayProgress(day);
    if (p.done > 0) {
      state.checkins.push(today);
      saveState();
    }
  }

  if (d.isReview) {
    return renderReviewDay(day, d);
  }

  let html = '';

  // Header
  html += `<div class="content-header">`;
  html += `<div class="breadcrumb"><span>Day ${day}</span><span>/</span><span>${PLAN.weeks[d.week - 1].name}</span><span>/</span><span>${PLAN.weeks[d.week - 1].subtitle}</span></div>`;
  html += `<div class="day-title">Day ${day} · ${d.title}</div>`;
  html += `</div>`;

  // Blocked warning
  if (hasBlockedKp(day)) {
    html += `<div class="block-warning">⚠️ 今天有 ${state.customKps.filter(k => k.day === day && k.priority === 'red' && !k.done).length} 个阻塞型知识点需要优先处理</div>`;
  }

  // Schedule bar
  html += `<div class="schedule-bar">`;
  html += `<span class="seg seg-blue">20min 复习</span><span class="arrow">→</span>`;
  html += `<span class="seg seg-blue">80min 学习</span><span class="arrow">→</span>`;
  html += `<span class="seg seg-green">25min 卡片</span><span class="arrow">→</span>`;
  html += `<span class="seg seg-orange">20min 算法</span><span class="arrow">→</span>`;
  html += `<span class="seg seg-yellow">20min 模拟</span>`;
  html += `</div>`;

  // Knowledge block
  if (d.knowledge) {
    const p = dayProgress(day);
    let kd = 0, kt = d.knowledge.length;
    d.knowledge.forEach((_, i) => { if (state.tasks[dayTaskKey(day, i)]) kd++; });
    html += `<div class="block block-blue">`;
    html += `<div class="block-header"><span class="block-title">📌 重点知识（80min）</span><span class="block-progress">${kd}/${kt}</span></div>`;
    html += `<div class="task-list">`;
    d.knowledge.forEach((kp, i) => {
      const key = dayTaskKey(day, i);
      const checked = state.tasks[key];
      html += `<div class="task-item ${checked ? 'done' : ''}" onclick="toggleTask('${key}')">`;
      html += `<span class="checkbox ${checked ? 'checked' : ''}"></span>`;
      html += `<span class="task-text">${kp}</span>`;
      html += `</div>`;
    });
    html += `</div></div>`;
  }

  // Must-know questions
  if (d.mustKnow) {
    let md = 0;
    d.mustKnow.forEach((_, i) => { if (state.tasks[dayTaskKey(day, 100 + i)]) md++; });
    html += `<div class="block block-purple">`;
    html += `<div class="block-header"><span class="block-title">❓ 必会题</span><span class="block-progress">${md}/${d.mustKnow.length}</span></div>`;
    html += `<div class="task-list">`;
    d.mustKnow.forEach((q, i) => {
      const key = dayTaskKey(day, 100 + i);
      const checked = state.tasks[key];
      html += `<div class="task-item ${checked ? 'done' : ''}" onclick="toggleTask('${key}')">`;
      html += `<span class="checkbox ${checked ? 'checked' : ''}"></span>`;
      html += `<span class="task-text">${q}</span>`;
      html += `</div>`;
    });
    html += `</div></div>`;
  }

  // Keyword card inline
  if (d.card) {
    const ck = cardKey(day);
    const eval_ = state.cardEval[ck];
    html += `<div class="block block-green">`;
    html += `<div class="block-header"><span class="block-title">🃏 关键词卡片（25min）</span><span class="block-progress">${eval_ === 'pass' ? '✓' : eval_ === 'fail' ? '✕' : '0/1'}</span></div>`;

    html += `<div class="card-inline-actions" onclick="event.stopPropagation()">`;

    html += `<button class="card-eval-btn ${eval_ === 'fail' ? 'fail-active' : ''}" onclick="evalCard('${ck}','fail')">✕ 不熟</button>`;
    html += `</div></div></div>`;
  }

  // Algo
  if (d.algo) {
    const lc = d.algo.lc;
    const checked = lc ? state.algo['lc' + lc] : false;
    html += `<div class="block block-orange">`;
    html += `<div class="block-header"><span class="block-title">💻 算法练习（20min）</span><span class="block-progress">${checked ? '✓' : '0/1'}</span></div>`;

    html += `<div class="algo-left">`;
    html += `<span class="checkbox ${checked ? 'checked' : ''}" onclick="toggleAlgo('${lc}')"></span>`;
    html += `<span class="algo-name">${d.algo.name}</span>`;
    html += `</div>`;
    if (lc) html += `<a class="algo-tag" href="https://leetcode.cn/problems/${lc === '144' ? 'binary-tree-preorder-traversal' : lc === '94' ? 'binary-tree-inorder-traversal' : lc === '145' ? 'binary-tree-postorder-traversal' : 'problems/' + lc}" target="_blank">LC ${lc}</a>`;
    html += `</div></div>`;
  }

  // Mock
  if (d.mock) {
    let mmd = 0;
    d.mock.forEach((_, i) => { if (state.mock[dayMockKey(day, i)]) mmd++; });
    html += `<div class="block block-yellow">`;
    html += `<div class="block-header"><span class="block-title">🎤 晚间模拟（20min）</span><span class="block-progress">${mmd}/${d.mock.length}</span></div>`;
    d.mock.forEach((m, i) => {
      const key = dayMockKey(day, i);
      const checked = state.mock[key];
      const timer = state.mockTimers[key];
      let timerClass = 'mock-timer';
      let timerText = '开始';
      if (timer) {
        if (timer.status === 'done') {
          timerClass += ' done';
          const mm = String(Math.floor(timer.duration / 60)).padStart(2, '0');
          const ss = String(timer.duration % 60).padStart(2, '0');
          timerText = `${mm}:${ss} ✓`;
        } else if (timer.status === 'timing') {
          timerClass += ' timing';
          timerText = '计时中';
        }
      }
      html += `<div class="mock-item ${checked ? 'done' : ''}">`;
      html += `<div class="mock-top">`;
      html += `<span class="checkbox ${checked ? 'checked' : ''}" onclick="toggleMock('${key}')"></span>`;
      html += `<span class="${timerClass}" onclick="toggleTimer('${key}')">${timerText}</span>`;
      html += `</div>`;
      html += `<p class="mock-question">${m.q}</p>`;
      if (m.tips) {
        html += `<span class="mock-tips" onclick="toggleTips(this)">参考要点 ▼</span>`;
        html += `<div class="mock-tips-content">${m.tips}</div>`;
      }
      html += `</div>`;
    });
    html += `</div>`;
  }

  // Tier 5 content
  if (state.tier !== '3h' && d.tier5 && d.tier5.length) {
    html += `<div class="block block-gray">`;
    html += `<div class="block-header"><span class="block-title">📖 进阶档内容（${state.tier}）</span></div>`;
    html += `<div class="task-list">`;
    d.tier5.forEach((t, i) => {
      const key = `day${day}_t5_${i}`;
      const checked = state.tasks[key];
      html += `<div class="task-item ${checked ? 'done' : ''}" onclick="toggleTask('${key}')">`;
      html += `<span class="checkbox ${checked ? 'checked' : ''}"></span>`;
      html += `<span class="task-text">${t}</span>`;
      html += `</div>`;
    });
    html += `</div></div>`;
  }

  // Tier 6 content
  if (state.tier === '6h' && d.tier6 && d.tier6.length) {
    html += `<div class="block block-gray">`;
    html += `<div class="block-header"><span class="block-title">🔧 深度档内容（6h）</span></div>`;
    html += `<div class="task-list">`;
    d.tier6.forEach((t, i) => {
      const key = `day${day}_t6_${i}`;
      const checked = state.tasks[key];
      html += `<div class="task-item ${checked ? 'done' : ''}" onclick="toggleTask('${key}')">`;
      html += `<span class="checkbox ${checked ? 'checked' : ''}"></span>`;
      html += `<span class="task-text">${t}</span>`;
      html += `</div>`;
    });
    html += `</div></div>`;
  }

  // Custom knowledge points
  html += `<div class="block block-gray">`;
  html += `<div class="block-header"><span class="block-title">⭐ 自定义知识点</span><span class="block-progress">${state.customKps.filter(k => k.day === day && k.done).length}/${state.customKps.filter(k => k.day === day).length}</span></div>`;
  const dayKps = state.customKps.filter(k => k.day === day);
  if (dayKps.length) {
    dayKps.forEach(k => {
      html += `<div class="custom-kp-item">`;
      html += `<span class="checkbox ${k.done ? 'checked' : ''}" onclick="toggleCustomKp('${k.id}')"></span>`;
      html += `<span class="kp-badge ${k.priority}">${k.priority === 'red' ? '🔴 阻塞' : k.priority === 'yellow' ? '🟡 关联' : '🟢 加分'}</span>`;
      html += `<span class="task-text ${k.done ? '' : ''}" style="${k.done ? 'text-decoration:line-through;color:var(--text-faint)' : ''}">${k.text}</span>`;
      html += `<button class="kp-delete" onclick="deleteCustomKp('${k.id}')">✕</button>`;
      html += `</div>`;
    });

  html += `<div class="custom-kp-add">`;

  html += `<div class="priority-select" id="kpPriority_${day}">`;
  html += `<button class="priority-btn" onclick="selectPriority(${day},'red')">🔴</button>`;

  html += `</div>`;

  return html;
}

// ===================== INTERACTIONS =====================
function goToDay(day) {
  state.currentDay = day;
  state.currentView = 'day';
  state.lastDay = day;
  // Auto expand the week containing this day
  PLAN.weeks.forEach((w, idx) => {
    if (w.days.includes(day) && !state.expandedWeeks.includes(idx + 1)) {
      state.expandedWeeks.push(idx + 1);
    }
  });
  saveState();
  renderSidebar();
  renderMain();
}

function goToTool(tool) {
  state.currentView = tool;
  saveState();
  renderSidebar();
  renderMain();
}

function switchTier(tier) {
  state.tier = tier;
  saveState();
  renderMain();
}

function toggleTask(key) {
  state.tasks[key] = !state.tasks[key];
  saveState();
  checkCheckin();
  renderSidebar();
  renderMain();
}

function toggleMock(key) {
  state.mock[key] = !state.mock[key];
  saveState();
  checkCheckin();
  renderSidebar();
  renderMain();
}

function toggleAlgo(lc) {
  if (!lc) return;
  const key = 'lc' + lc;
  state.algo[key] = !state.algo[key];
  saveState();
  checkCheckin();
  renderSidebar();
  renderMain();
}

function toggleError(idx) {
  state.errors[idx].done = !state.errors[idx].done;
  saveState();
  renderMain();
}

function deleteError(idx) {
  state.errors.splice(idx, 1);
  saveState();
  renderMain();
}

function addError() {
  const input = document.getElementById('newError');
  const text = input.value.trim();
  if (!text) return;
  state.errors.push({ text, done: false });
  saveState();
  renderMain();
}

// Custom KP
let kpPriority = 'yellow';

function selectPriority(day, p) {
  kpPriority = p;
  const container = document.getElementById(`kpPriority_${day}`);
  if (!container) return;
  container.querySelectorAll('.priority-btn').forEach(b => {
    b.classList.remove('sel-red', 'sel-yellow', 'sel-green');
  });
  const btns = container.children;
  if (p === 'red') btns[0].classList.add('sel-red');
  else if (p === 'yellow') btns[1].classList.add('sel-yellow');
  else btns[2].classList.add('sel-green');
}

function addCustomKp(day) {
  const input = document.getElementById(`kpInput_${day}`);
  const text = input.value.trim();
  if (!text) return;
  const kp = {
    id: 'kp_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),
    day, text, priority: kpPriority, done: false
  };
  state.customKps.push(kp);
  saveState();
  renderSidebar();
  renderMain();
}

function toggleCustomKp(id) {
  const kp = state.customKps.find(k => k.id === id);
  if (kp) {
    kp.done = !kp.done;
    saveState();
    checkCheckin();
    renderSidebar();
    renderMain();
  }
}

function deleteCustomKp(id) {
  state.customKps = state.customKps.filter(k => k.id !== id);
  saveState();
  renderSidebar();
  renderMain();
}

// Card eval
function evalCard(key, result) {
  state.cardEval[key] = result;
  saveState();
  checkCheckin();
  renderSidebar();
  renderMain();
}

function evalCustomCard(id, result) {
  const c = state.customCards.find(c => c.id === id);
  if (c) {
    c.eval = result;
    saveState();
    renderMain();
  }
}

function addCustomCard() {
  const title = document.getElementById('newCardTitle').value.trim();
  const keywords = document.getElementById('newCardKeywords').value.trim();
  if (!title || !keywords) return;
  state.customCards.push({
    id: 'cc_' + Date.now(),
    title, keywords, eval: null
  });
  saveState();
  renderMain();
}

function deleteCustomCard(id) {
  state.customCards = state.customCards.filter(c => c.id !== id);
  saveState();
  renderMain();
}

function flipCard(id) {
  const el = document.getElementById('card_' + id);
  if (el) el.classList.toggle('flipped');
}

function flipInlineCard(el) {
  const title = el.querySelector('.card-inline-title');
  const hint = el.querySelector('.card-inline-hint');
  const kw = el.querySelector('.card-inline-keywords');
  if (title.style.display !== 'none') {
    title.style.display = 'none';
    hint.style.display = 'none';
    kw.style.display = 'block';
  } else {
    title.style.display = '';
    hint.style.display = '';
    kw.style.display = 'none';
  }
}

function toggleTips(el) {
  const content = el.nextElementSibling;
  content.classList.toggle('show');
  el.textContent = content.classList.contains('show') ? '参考要点 ▲' : '参考要点 ▼';
}

// Timer
function toggleTimer(key) {
  if (state.timerInterval) {
    clearInterval(state.timerInterval);
    state.timerInterval = null;
  }
  const existing = state.mockTimers[key];
  if (existing && existing.status === 'timing') {
    // Stop
    existing.status = 'done';
    saveState();
    renderMain();
    return;
  }
  if (existing && existing.status === 'done') {
    // Reset
    delete state.mockTimers[key];
    saveState();
    renderMain();
    return;
  }
  // Start
  state.mockTimers[key] = { duration: 0, status: 'timing', startTime: Date.now() };
  state.timerKey = key;
  state.timerInterval = setInterval(() => {
    const t = state.mockTimers[key];
    if (!t || t.status !== 'timing') {
      clearInterval(state.timerInterval);
      return;
    }
    t.duration = Math.floor((Date.now() - t.startTime) / 1000);
    // Update timer display
    const timerEl = document.querySelector(`[onclick="toggleTimer('${key}')"]`);
    if (timerEl) {
      const mm = String(Math.floor(t.duration / 60)).padStart(2, '0');
      const ss = String(t.duration % 60).padStart(2, '0');
      timerEl.textContent = `${mm}:${ss}`;
      timerEl.classList.remove('timing', 'warn', 'danger');
      if (t.duration >= 180) timerEl.classList.add('danger');
      else if (t.duration >= 120) timerEl.classList.add('warn');
      else timerEl.classList.add('timing');
    }
  }, 1000);
  saveState();
  renderMain();
}

// Check-in
function checkCheckin() {
  const today = todayStr();
  if (state.checkins.includes(today)) return;
  const p = dayProgress(state.currentDay);
  if (p.done > 0) {
    state.checkins.push(today);
    saveState();
  }
}

// Export / Import
function exportJSON() {
  const data = JSON.stringify(state, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `java-interview-backup-${todayStr()}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('已导出备份文件');
}

function importJSON(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      Object.assign(state, data);
      saveState();
      renderSidebar();
      renderMain();
      showToast('导入成功');
    } catch(err) {
      showToast('导入失败：文件格式错误');
    }
  };
  reader.readAsText(file);
}

// Review modal
function openReviewModal() {
  const modal = document.getElementById('reviewModal');
  const content = document.getElementById('reviewModalContent');
  let html = `<button class="modal-close" onclick="closeReviewModal()">✕</button>`;
  html += `<div class="modal-title">📋 面试前复习清单</div>`;

  // Errors
  const pendingErrors = state.errors.filter(e => !e.done);
  html += `<div class="review-section">`;
  html += `<div class="review-section-title">🔴 必看易错（${pendingErrors.length} 条）</div>`;
  if (pendingErrors.length) {
    pendingErrors.forEach(e => {
      html += `<div class="review-section-item"><span>•</span> ${e.text}</div>`;
    });
  } else {
    html += `<div class="review-section-item" style="color:var(--text-muted)">全部已掌握</div>`;
  }
  html += `</div>`;

  // Yellow KPs
  const yellowPending = state.customKps.filter(k => k.priority === 'yellow' && !k.done);
  html += `<div class="review-section">`;
  html += `<div class="review-section-title">🟡 待补知识点（${yellowPending.length} 条）</div>`;
  if (yellowPending.length) {
    yellowPending.forEach(k => {
      html += `<div class="review-section-item"><span>•</span> ${k.text}<span class="source">← Day ${k.day}</span></div>`;
    });
  } else {
    html += `<div class="review-section-item" style="color:var(--text-muted)">暂无</div>`;
  }
  html += `</div>`;

  // Card fails
  const failCards = [];
  for (const day in PLAN.days) {
    const ck = cardKey(parseInt(day));
    if (state.cardEval[ck] === 'fail') {
      failCards.push({ day: parseInt(day), title: PLAN.days[day].card?.title || '' });
    }
  }
  state.customCards.filter(c => c.eval === 'fail').forEach(c => {
    failCards.push({ day: '自定义', title: c.title });
  });
  html += `<div class="review-section">`;
  html += `<div class="review-section-title">📌 卡片自评 ❌ 待复习（${failCards.length} 条）</div>`;
  if (failCards.length) {
    failCards.forEach(c => {
      html += `<div class="review-section-item"><span>•</span> ${c.title}<span class="source">← Day ${c.day}</span></div>`;
    });
  } else {
    html += `<div class="review-section-item" style="color:var(--text-muted)">暂无</div>`;
  }
  html += `</div>`;

  // Green KPs
  const greenPending = state.customKps.filter(k => k.priority === 'green' && !k.done);
  html += `<div class="review-section">`;
  html += `<div class="review-section-title">🟢 加分知识点（${greenPending.length} 条）</div>`;
  if (greenPending.length) {
    greenPending.forEach(k => {
      html += `<div class="review-section-item"><span>•</span> ${k.text}<span class="source">← Day ${k.day}</span></div>`;
    });
  } else {
    html += `<div class="review-section-item" style="color:var(--text-muted)">暂无</div>`;
  }
  html += `</div>`;

  html += `<div style="margin-top:16px;text-align:center"><button class="btn" onclick="window.print()" style="padding:8px 24px">🖨️ 打印复习清单</button></div>`;

  content.innerHTML = html;
  modal.classList.add('show');
}

function closeReviewModal() {
  document.getElementById('reviewModal').classList.remove('show');
}

// Card filter
function filterCards(btn, filter) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.flip-card').forEach(card => {
    const isPass = card.classList.contains('eval-pass');
    const isFail = card.classList.contains('eval-fail');
    let show = true;
    if (filter === 'untested') show = !isPass && !isFail;
    else if (filter === 'fail') show = isFail;
    else if (filter === 'pass') show = isPass;
    card.style.display = show ? '' : 'none';
  });
}
